openapi: 3.1.0
info:
  title: Conjugate.cc API
  version: 1.0.0
  description: API for the Conjugate.cc verb conjugation drill application.

paths:
  /v1/status:
    get:
      summary: Health check
      operationId: GetStatus
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'

  /v1/metadata:
    get:
      summary: Build metadata
      operationId: GetMetadata
      responses:
        '200':
          description: Service build metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Metadata'

components:
  schemas:
    Status:
      type: object
      properties:
        status:
          type: string
          example: ok
      required:
        - status

    Metadata:
      type: object
      properties:
        git_sha:
          type: string
          example: d32e693
        build_time:
          type: string
          example: 2026-03-14T17:33:30Z
      required:
        - git_sha
        - build_time
