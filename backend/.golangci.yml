version: "2"
linters:
  # default: standard
  enable:
    - unused
    - exhaustive
    - err113
    - paralleltest
    - misspell
    - intrange
    - noinlineerr
    - gochecknoglobals
    - exhaustruct
    - nosprintfhostport
    - perfsprint
    - protogetter
    - recvcheck
  settings:
    exhaustruct:
      allow-empty: true
      include:
        - 'github\.com/svdx9/conjugate-cc/backend/.*'
    misspell:
      ignore-rules:
        - participe

  disable:
    - depguard
