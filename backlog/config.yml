project_name: "conjugate.cc"
default_status: "To Do"
statuses: ["To Do", "In Progress", "Done", "Cancelled"]
labels: []
definition_of_done:
  - Tests pass
  - Documentation updated
  - No regressions introduced
  - Implementation Notes in Backlog Task is complete
  - Final Summary in Backlog Task is complete
date_format: yyyy-mm-dd
max_column_width: 20
default_editor: "nvim"
auto_open_browser: true
default_port: 6420
remote_operations: true
auto_commit: false
zero_padded_ids: 3
bypass_git_hooks: false
check_active_branches: true
active_branch_days: 30
task_prefix: "task"
