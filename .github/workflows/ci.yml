name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - name: Cache Go module cache
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-mod-${{ hashFiles('backend/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-mod-

      - name: Cache Go build cache
        uses: actions/cache@v4
        with:
          path: .cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('backend/**/*.go') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Cache tools
        uses: actions/cache@v4
        with:
          path: backend/tools/bin
          key: ${{ runner.os }}-tools-${{ hashFiles('Makefile') }}

      - name: Lint
        run: make lint

      - name: Test
        run: make test
